[General]
network = QueueingTimeMeasurementShowcase
description = "Measure queueing time in the switch"
sim-time-limit = 5s

# source application ~96Mbps throughput
*.source.numApps = 1
*.source.app[0].typename = "UdpSourceApp"
*.source.app[0].source.packetLength = 1200B
*.source.app[0].source.productionInterval = exponential(100us)
*.source.app[0].io.destAddress = "destination"
*.source.app[0].io.destPort = 1000

# destination application
*.destination.numApps = 1
*.destination.app[0].typename = "UdpSinkApp"
*.destination.app[0].io.localPort = 1000
[Config C1]
extends = General
*.source.app[0].source.productionInterval = exponential(100us)

[Config C2]
extends = General
*.source.app[0].source.productionInterval = exponential(50us)

[Config C3]
extends = General
*.source.app[0].source.productionInterval = exponential(25us)

[Config C4]
extends = General
*.source.app[0].source.productionInterval = exponential(10us)
